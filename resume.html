<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allen Loukiantchenko | Resume</title>
    
    <!-- Syncing Typography with Index -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           1. CORE VARIABLES & RESET
           ========================================= */
        :root {
            --bg-dark: #000000;
            --bg-purple: #1a032b;
            --accent-purple: #3a0359;
            --accent-hover: #550580;
            --text-main: #ffffff;
            --font-headings: 'Montserrat', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden; 
            font-family: var(--font-body);
            /* Matching angled gradient for visual consistency */
            background: linear-gradient(135deg, var(--bg-dark) 30%, var(--bg-purple) 100%);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* =========================================
           2. TYPOGRAPHY & BUTTONS
           ========================================= */
        h2 { 
            font-family: var(--font-headings);
            font-size: 2.25rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--text-main); 
            margin: 1.5rem 0 1rem 0;
            text-align: center;
        }

        .btn {
            display: inline-block;
            font-family: var(--font-headings);
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.85rem 2rem;
            color: var(--text-main);
            background-color: var(--accent-purple);
            border: none;
            border-radius: 0.25rem;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-align: center;
        }

        .btn:hover { background-color: var(--accent-hover); }

        /* =========================================
           3. TOP NAVIGATION 
           ========================================= */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 4rem; 
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .nav-left { display: flex; gap: 15px; }

        /* =========================================
           4. RESUME VIEWER LAYOUT
           ========================================= */
        .resume-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; 
            padding-top: 100px; 
            padding-bottom: 20px; 
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .pdf-viewer {
            width: 95%;
            flex-grow: 1; 
            min-height: 0; 
            border: 4px solid var(--accent-purple);
            border-radius: 0.25rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 1.5rem;
            background-color: #fff; 
        }

        /* =========================================
           5. MOBILE RESPONSIVE DESIGN
           ========================================= */
        @media screen and (max-width: 980px) {
            html, body { overflow: auto; height: auto; } 
            .top-nav { position: relative; flex-direction: column; height: auto; padding: 1rem; gap: 10px; }
            .nav-left { flex-direction: column; width: 100%; }
            .nav-left .btn, .top-nav > .btn { width: 100%; text-align: center; }
            
            .resume-wrapper { padding-top: 10px; height: 85vh; }
        }
    </style>
</head>
<body>

    <!-- TOP NAVIGATION BAR -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="btn">Home</a>
            <a href="index.html#projects-bar" class="btn">View My Projects</a>
            <a href="resume.html" class="btn">View & Download Resume</a>
        </div>
        <a href="index.html#contact" class="btn">Contact Me</a>
    </nav>

    <!-- RESUME VIEWPORT CONTENT -->
    <main class="resume-wrapper">
        
        <h2>My Resume</h2>
        
        <iframe src="Allen_Loukiantchenko_Resume.pdf" class="pdf-viewer"></iframe>
        
        <a href="Allen_Loukiantchenko_Resume.pdf" download="Allen_Loukiantchenko_Resume.pdf" class="btn">Download PDF Version</a>
        
    </main>

</body>
</html>
