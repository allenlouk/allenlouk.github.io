<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allen Loukiantchenko | Resume</title>
    <style>
        /* =========================================
           1. CORE VARIABLES & RESET
           ========================================= */
        :root {
            --bg-dark: #000000;
            --bg-purple: #1a032b;
            --accent-purple: #3a0359;
            --accent-hover: #550580;
            --text-main: #ffffff;
            --font-stack: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Lock the body to exactly the viewport height and disable scrolling */
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden; 
            font-family: var(--font-stack);
            background: linear-gradient(to right, var(--bg-dark) 0%, var(--bg-purple) 100%);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* =========================================
           2. TYPOGRAPHY & BUTTONS
           ========================================= */
        /* Exact match to the "My Projects" title styling */
        h2 { 
            font-size: 2.25rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--text-main); 
            margin: 1.5rem 0 1rem 0;
            text-align: center;
        }

        .btn {
            display: inline-block;
            font-family: var(--font-stack);
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.85rem 2rem;
            color: var(--text-main);
            background-color: var(--accent-purple);
            border: none;
            border-radius: 0.25rem;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-align: center;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        /* =========================================
           3. TOP NAVIGATION (Exact Match to Index)
           ========================================= */
        .top-nav {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 80px; /* Fixed height to calculate offsets */
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4rem;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .nav-left { display: flex; gap: 15px; }
        
        /* Modifying nav buttons for white background */
        .top-nav .btn {
            font-size: 0.9rem;
            padding: 0.6rem 1.5rem;
        }

        /* =========================================
           4. RESUME VIEWER LAYOUT (No Scroll Grid)
           ========================================= */
        .resume-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* Takes full viewport */
            padding-top: 80px; /* Clears the fixed nav bar */
            padding-bottom: 20px; /* Cushion at the bottom */
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .pdf-viewer {
            width: 95%;
            /* Flex-grow: 1 forces the iframe to expand and fill ALL remaining space perfectly */
            flex-grow: 1; 
            min-height: 0; /* Required for flexbox scaling */
            border: 4px solid var(--accent-purple);
            border-radius: 0.25rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 1.5rem;
            background-color: #fff; /* Shows white while PDF loads */
        }

        /* =========================================
           5. MOBILE RESPONSIVE DESIGN
           ========================================= */
        @media screen and (max-width: 980px) {
            html, body { overflow: auto; height: auto; } /* Allow scrolling on small phones if needed */
            .top-nav { position: relative; flex-direction: column; height: auto; padding: 1rem; gap: 10px; }
            .nav-left { flex-direction: column; width: 100%; }
            .nav-left .btn, .top-nav > .btn { width: 100%; text-align: center; }
            
            .resume-wrapper { padding-top: 10px; height: 85vh; }
        }
    </style>
</head>
<body>

    <!-- TOP NAVIGATION BAR -->
    <nav class="top-nav">
        <div class="nav-left">
            <!-- These point back to the specific sections on your main page -->
            <a href="index.html#projects-bar" class="btn">View My Projects</a>
            <a href="resume.html" class="btn">View & Download Resume</a>
        </div>
        <a href="index.html#contact" class="btn">Contact Me</a>
    </nav>

    <!-- RESUME VIEWPORT CONTENT -->
    <main class="resume-wrapper">
        
        <h2>My Resume</h2>
        
        <!-- The Embedded PDF Document -->
        <iframe src="Allen_Loukiantchenko_Resume.pdf" class="pdf-viewer"></iframe>
        
        <!-- The Direct Download Button -->
        <a href="Allen_Loukiantchenko_Resume.pdf" download="Allen_Loukiantchenko_Resume.pdf" class="btn">Download PDF Version</a>
        
    </main>

</body>
</html>
